services:
  backend:
    image: ghcr.io/leanderziehm/todo-backend:latest
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "4000:4000"

  frontend:
    image: ghcr.io/leanderziehm/todo-frontend:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "4001:80"
    depends_on:
      - backend
    environment:
      API_URL: http://127.0.0.1:4000

